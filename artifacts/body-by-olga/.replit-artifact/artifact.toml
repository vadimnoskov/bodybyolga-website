kind = "web"
previewPath = "/"
title = "Body by Olga"
version = "1.0.0"
id = "artifacts/body-by-olga"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20728

[services.development]
run = "pnpm --filter @workspace/body-by-olga run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/body-by-olga", "run", "build" ]
publicDir = "artifacts/body-by-olga/dist"
serve = "static"

[services.env]
PORT = "20728"
BASE_PATH = "/"
